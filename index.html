<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDT Vocabulary Cards</title>
    <style>
        body { margin: 0; padding: 0; box-sizing: border-box; background-color: #0d0d11; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; width: 90%; max-width: 550px; perspective: 1000px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.8rem; color: #9f7aea; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-title { font-size: 0.9rem; color: #718096; margin-bottom: 25px; }
        .card-box { width: 100%; height: 340px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 25px; }
        .card-box.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid #2d3748; }
        .card-front { background: linear-gradient(135deg, #1a1c23, #111217); }
        .card-back { background: linear-gradient(135deg, #1b1424, #0d0914); transform: rotateY(180deg); border-color: #553c9a; }
        .word-type { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #a0aec0; padding-top: 5px; }
        .word-text-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .word-text { font-size: 2.6rem; font-weight: bold; color: #fff; word-break: break-word; text-align: center; }
        .meaning-text { font-size: 1.8rem; font-weight: 600; color: #b794f4; text-align: center; margin-bottom: 15px; }
        .sentence-box { background: rgba(255, 255, 255, 0.03); border-left: 3px solid #9f7aea; padding: 12px 15px; border-radius: 4px; text-align: left; width: 100%; box-sizing: border-box; }
        .eng-sentence { font-size: 0.95rem; color: #e2e8f0; font-style: italic; line-height: 1.4; margin-bottom: 5px; }
        .highlight-word { color: #b794f4; font-weight: bold; font-style: normal; }
        .tr-sentence { font-size: 0.85rem; color: #a0aec0; line-height: 1.4; }
        .tip { font-size: 0.8rem; color: #4a5568; padding-bottom: 5px; width: 100%; text-align: center; }
        .btn-next { background-color: #553c9a; color: #fff; border: none; padding: 14px 40px; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(85, 60, 154, 0.4); transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; }
        .btn-next:hover { background-color: #6b46c1; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(107, 70, 193, 0.6); }
    </style>
</head>
<body>

    <div class="container">
        <h1>YDT Vocabulary Cards</h1>
        <div class="sub-title">Study Zone</div>
        
        <div class="card-box" id="card" onclick="flipCard()">
            <div class="card-side card-front">
                <div class="word-type" id="wordType">Loading...</div>
                <div class="word-text-container">
                    <div class="word-text" id="englishWord">...</div>
                </div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
            
            <div class="card-side card-back">
                <div class="word-type" style="color: #9f7aea;">Meaning & Example</div>
                <div class="word-text-container">
                    <div class="meaning-text" id="turkishMeaning">...</div>
                    <div class="sentence-box">
                        <div class="eng-sentence" id="sampleEng">...</div>
                        <div class="tr-sentence" id="sampleTr">...</div>
                    </div>
                </div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
        </div>
        
        <button class="btn-next" onclick="nextWord(event)">Sıradaki Kelime ➔</button>
    </div>

    <script>
        // Gerçek Anlamda Sınırsız Döngü Sağlayan Genişletilmiş YDT Kelime Havuzu
        const wordPool = [
            { eng: "Barren", tr: "Kurak, verimsiz", type: "Adjective", exEng: "Nothing could grow in this <span class='highlight-word'>barren</span> soil.", exTr: "Bu verimsiz toprakta hiçbir şey büyüyemezdi." },
            { eng: "Enhance", tr: "Geliştirmek, artırmak", type: "Verb", exEng: "The new strategy will <span class='highlight-word'>enhance</span> your language skills.", exTr: "Yeni strateji dil becerilerinizi geliştirecektir." },
            { eng: "Facilitate", tr: "Kolaylaştırmak", type: "Verb", exEng: "Good planning can <span class='highlight-word'>facilitate</span> the entire process.", exTr: "İyi bir planlama tüm süreci kolaylaştırabilir." },
            { eng: "Implement", tr: "Uygulamaya koymak", type: "Verb", exEng: "The school will <span class='highlight-word'>implement</span> new rules next term.", exTr: "Okul önümüzdeki dönem yeni kuralları uygulamaya koyacak." },
            { eng: "Assess", tr: "Değerlendirmek", type: "Verb", exEng: "We need to <span class='highlight-word'>assess</span> the risks before making a choice.", exTr: "Bir seçim yapmadan önce riskleri değerlendirmemiz gerekiyor." },
            { eng: "Acquire", tr: "Edinmek, kazanmak", type: "Verb", exEng: "She managed to <span class='highlight-word'>acquire</span> a reputation as a fine writer.", exTr: "İyi bir yazar olarak ün kazanmayı başardı." },
            { eng: "Determine", tr: "Belirlemek, saptamak", type: "Verb", exEng: "Your hard work will <span class='highlight-word'>determine</span> your future success.", exTr: "Sıkı çalışmanız gelecekteki başarınızı belirleyecektir." },
            { eng: "Vulnerable", tr: "Hassas, savunmasız", type: "Adjective", exEng: "The ecosystem is highly <span class='highlight-word'>vulnerable</span> to climate change.", exTr: "Ekosistem iklim değişikliğine karşı son derece savunmasızdır." },
            { eng: "Sustainable", tr: "Sürdürülebilir", type: "Adjective", exEng: "We need to find <span class='highlight-word'>sustainable</span> energy sources.", exTr: "Sürdürülebilir enerji kaynakları bulmamız gerekiyor." },
            { eng: "Significant", tr: "Önemli, kayda değer", type: "Adjective", exEng: "There has been a <span class='highlight-word'>significant</span> increase in sales.", exTr: "Satışlarda kayda değer bir artış oldu." },
            { eng: "Abandon", tr: "Terk etmek, bırakmak", type: "Verb", exEng: "The sailors had to <span class='highlight-word'>abandon</span> the sinking ship.", exTr: "Denizciler batan gemiyi terk etmek zorunda kaldı." },
            { eng: "Abolish", tr: "Yürürlükten kaldırmak", type: "Verb", exEng: "Some countries decided to <span class='highlight-word'>abolish</span> old laws.", exTr: "Bazı ülkeler eski yasaları kaldırmaya karar verdi." },
            { eng: "Accurate", tr: "Doğru, kesin", type: "Adjective", exEng: "The clock is highly <span class='highlight-word'>accurate</span> and never loses time.", exTr: "Saat son derece doğrudur ve asla geri kalmaz." },
            { eng: "Ambiguous", tr: "Belirsiz, muğlak", type: "Adjective", exEng: "His explanation was too <span class='highlight-word'>ambiguous</span> to understand.", exTr: "Açıklaması anlaşılmayacak kadar belirsizdi." },
            { eng: "Compulsory", tr: "Zorunlu, mecburi", type: "Adjective", exEng: "Wearing a helmet is <span class='highlight-word'>compulsory</span> while riding a bike.", exTr: "Bisiklet sürerken kask takmak zorunludur." },
            { eng: "Crucial", tr: "Çok önemli, kritik", type: "Adjective", exEng: "Vitamin C plays a <span class='highlight-word'>crucial</span> role in our health.", exTr: "C vitamini sağlığımızda kritik bir rol oynar." },
            { eng: "Decline", tr: "Azalmak, reddetmek", type: "Verb", exEng: "The population of the village began to <span class='highlight-word'>decline</span>.", exTr: "Köyün nüfusu azalmaya başladı." },
            { eng: "Drastic", tr: "Şiddetli, ani, radikal", type: "Adjective", exEng: "The company took <span class='highlight-word'>drastic</span> measures to cut costs.", exTr: "Şirket maliyetleri kısmak için radikal önlemler aldı." },
            { eng: "Emphasize", tr: "Vurgulamak", type: "Verb", exEng: "The coach wanted to <span class='highlight-word'>emphasize</span> the importance of teamwork.", exTr: "Antrenör takım çalışmasının önemini vurgulamak istedi." },
            { eng: "Fluctuate", tr: "Dalgalanmak, değişip durmak", type: "Verb", exEng: "The temperature will <span class='highlight-word'>fluctuate</span> throughout the week.", exTr: "Sıcaklık hafta boyunca dalgalanacak." },
            { eng: "Hostile", tr: "Düşmanca, saldırgan", type: "Adjective", exEng: "The crowd became <span class='highlight-word'>hostile</span> when the concert was delayed.", exTr: "Konser gecikince kalabalık düşmanca bir tavır takındı." },
            { eng: "Inevitable", tr: "Kaçınılmaz", type: "Adjective", exEng: "Growing older is an <span class='highlight-word'>inevitable</span> part of life.", exTr: "Yaşlanmak hayatın kaçınılmaz bir parçasıdır." },
            { eng: "Mutual", tr: "Karşılıklı, ortak", type: "Adjective", exEng: "They parted ways by <span class='highlight-word'>mutual</span> agreement.", exTr: "Karşılıklı anlaşma yoluyla yollarını ayırdılar." },
            { eng: "Precious", tr: "Değerli, kıymetli", type: "Adjective", exEng: "Gold is a <span class='highlight-word'>precious</span> metal used for centuries.", exTr: "Altın, yüzyıllardır kullanılan değerli bir metaldir." },
            { eng: "Reluctant", tr: "İsteksiz, gönülsüz", type: "Adjective", exEng: "He was <span class='highlight-word'>reluctant</span> to talk about his past.", exTr: "Geçmişi hakkında konuşmaya isteksizdi." },
            { eng: "Sufficient", tr: "Yeterli, kafi", type: "Adjective", exEng: "We have <span class='highlight-word'>sufficient</span> food to last for a week.", exTr: "Bir hafta yetecek kadar yeterli yiyeceğimiz var." },
            { eng: "Adversely", tr: "Olumsuz yönde", type: "Adverb", exEng: "The economy was <span class='highlight-word'>adversely</span> affected by the crisis.", exTr: "Ekonomi krizden olumsuz yönde etkilendi." },
            { eng: "Profoundly", tr: "Derinden, tamamen", type: "Adverb", exEng: "Her words <span class='highlight-word'>profoundly</span> touched everyone in the room.", exTr: "Sözleri odadaki herkesi derinden etkiledi." },
            { eng: "Abundant", tr: "Bol, bereketli", type: "Adjective", exEng: "The country has <span class='highlight-word'>abundant</span> oil reserves.", exTr: "Ülkenin bol petrol rezervleri var." },
            { eng: "Accidentally", tr: "Kazara, tesadüfen", type: "Adverb", exEng: "I <span class='highlight-word'>accidentally</span> dropped my phone on the floor.", exTr: "Telefonumu kazara yere düşürdüm." },
            { eng: "Accomplish", tr: "Başarmak, tamamlamak", type: "Verb", exEng: "You can <span class='highlight-word'>accomplish</span> anything with enough effort.", exTr: "Yeterli çaba ile her şeyi başarabilirsin." },
            { eng: "Accumulate", tr: "Biriktirmek, toplamak", type: "Verb", exEng: "Snow began to <span class='highlight-word'>accumulate</span> on the mountain tops.", exTr: "Dağ tepelerinde kar birikmeye başladı." },
            { eng: "Baffle", tr: "Şaşırtmak, aklını karıştırmak", type: "Verb", exEng: "The detective was completely <span class='highlight-word'>baffle</span>d by the case.", exTr: "Dedektif vaka karşısında tamamen şaşkına dönmüştü." },
            { eng: "Cautious", tr: "Tedbirli, dikkatli", type: "Adjective", exEng: "You should be <span class='highlight-word'>cautious</span> when revealing secrets.", exTr: "Sırları açıklarken tedbirli olmalısınız." },
            { eng: "Cherish", tr: "Değer vermek, korumak", type: "Verb", exEng: "We should <span class='highlight-word'>cherry</span> every moment we spend together.", exTr: "Birlikte geçirdiğimiz her anın değerini bilmeliyiz." },
            { eng: "Deliberately", tr: "Kasten, bilerek", type: "Adverb", exEng: "He <span class='highlight-word'>deliberately</span> broke the rules to get attention.", exTr: "Dikkat çekmek için kuralları kasten çiğnedi." },
            { eng: "Devastate", tr: "Tahrip etmek, yıkmak", type: "Verb", exEng: "The flood managed to <span class='highlight-word'>devastate</span> the crop fields.", exTr: "Sel, ekin tarlalarını mahvetmeyi başardı." },
            { eng: "Eager", tr: "Hevesli, istekli", type: "Adjective", exEng: "The children were <span class='highlight-word'>eager</span> to open their gifts.", exTr: "Çocuklar hediyelerini açmaya hevesliydi." },
            { eng: "Elaborate", tr: "Detaylı, ayrıntılı", type: "Adjective", exEng: "They built an <span class='highlight-word'>elaborate</span> trap to catch the thief.", exTr: "Hırsızı yakalamak için ayrıntılı bir tuzak kurdular." },
            { eng: "Fatal", tr: "Ölümcül, vahim", type: "Adjective", exEng: "The mistake proved to be <span class='highlight-word'>fatal</span> for the project.", exTr: "Hata, proje için ölümcül oldu." },
            { eng: "Feasible", tr: "Yapılabilir, olası", type: "Adjective", exEng: "It is a <span class='highlight-word'>feasible</span> plan that saves a lot of time.", exTr: "Çok fazla zaman kazandıran yapılabilir bir plan." },
            { eng: "Genuine", tr: "Gerçek, hakiki", type: "Adjective", exEng: "I could see a <span class='highlight-word'>genuine</span> smile on her face.", exTr: "Yüzünde gerçek bir gülümseme görebiliyordum." },
            { eng: "Hinder", tr: "Engellemek, aksatmak", type: "Verb", exEng: "The heavy snow will <span class='highlight-word'>hinder</span> traffic flow.", exTr: "Yoğun kar yağışı trafik akışını engelleyecek." },
            { eng: "Illusion", tr: "Yanılsama, illüzyon", type: "Noun", exEng: "The magician created a perfect <span class='highlight-word'>illusion</span> of flying.", exTr: "Sihirbaz mükemmel bir uçma illüzyonu yarattı." },
            { eng: "Indifferent", tr: "Kayıtsız, ilgisiz", type: "Adjective", exEng: "He was <span class='highlight-word'>indifferent</span> to the needs of others.", exTr: "Başkalarının ihtiyaçlarına karşı kayıtsızdı." },
            { eng: "Justify", tr: "Haklı çıkarmak", type: "Verb", exEng: "Nothing can <span class='highlight-word'>justify</span> such violent acts.", exTr: "Hiçbir şey bu tür şiddet eylemlerini haklı çıkaramaz." },
            { eng: "Neglect", tr: "İhmal etmek", type: "Verb", exEng: "Never <span class='highlight-word'>neglect</span> your duties as a student.", exTr: "Bir öğrenci olarak görevlerinizi asla ihmal etmeyin." },
            { eng: "Obscure", tr: "Belirsiz, gizlemek", type: "Adjective", exEng: "The view was <span class='highlight-word'>obscure</span>d by thick fog.", exTr: "Görüş yoğun sis nedeniyle belirsizleşmişti." },
            { eng: "Paradox", tr: "Çelişki, paradoks", type: "Noun", exEng: "It's a strange <span class='highlight-word'>paradox</span> that the richest man is unhappy.", exTr: "En zengin adamın mutsuz olması garip bir çelişkidir." },
            { eng: "Radically", tr: "Kökten, tamamen", type: "Adverb", exEng: "The village has <span class='highlight-word'>radically</span> changed over the years.", exTr: "Köy, yıllar içinde kökten değişti." },
            { eng: "Scarcity", tr: "Kıtlık, azlık", type: "Noun", exEng: "The <span class='highlight-word'>scarcity</span> of resources led to a great conflict.", exTr: "Kaynakların azlığı büyük bir çatışmaya yol açtı." },
            { eng: "Tangible", tr: "Somut, elle tutulur", type: "Adjective", exEng: "The police have no <span class='highlight-word'>tangible</span> proof against him.", exTr: "Polisin elinde ona karşı somut bir kanıt yok." },
            { eng: "Unprecedented", tr: "Eşi benzeri görülmemiş", type: "Adjective", exEng: "The event attracted an <span class='highlight-word'>unprecedented</span> number of people.", exTr: "Etkinlik, eşi benzeri görülmemiş sayıda insanı çekti." },
            { eng: "Vaguely", tr: "Belirsizce, hayal meyal", type: "Adverb", exEng: "I <span class='highlight-word'>vaguely</span> remember the house we lived in as kids.", exTr: "Çocukken yaşadığımız evi hayal meyal hatırlıyorum." },
            { eng: "Withstand", tr: "Karşı koymak, dayanmak", type: "Verb", exEng: "These trees can <span class='highlight-word'>withstand</span> severe winter storms.", exTr: "Bu ağaçlar şiddetli kış fırtınalarına dayanabilir." },
            { eng: "Yield", tr: "Ürün vermek, sağlamak", type: "Verb", exEng: "The investment will <span class='highlight-word'>yield</span> high profits in the future.", exTr: "Yatırım gelecekte yüksek karlar sağlayacaktır." }
        ];

        let activeQueue = [];
        const card = document.getElementById('card');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function regenerateQueue() {
            activeQueue = shuffleArray([...wordPool]);
        }

        function flipCard() { 
            card.classList.toggle('flipped'); 
        }

        function nextWord(event) {
            event.stopPropagation();
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(setNextWord, 250);
            } else { 
                setNextWord(); 
            }
        }

        function setNextWord() {
            if (activeQueue.length === 0) {
                regenerateQueue();
            }
            
            const selectedWord = activeQueue.shift();
            
            document.getElementById('wordType').innerText = selectedWord.type;
            document.getElementById('englishWord').innerText = selectedWord.eng;
            document.getElementById('turkishMeaning').innerText = selectedWord.tr;
            document.getElementById('sampleEng').innerHTML = selectedWord.exEng;
            document.getElementById('sampleTr').innerText = selectedWord.exTr;
        }

        window.onload = function() {
            regenerateQueue();
            setNextWord();
        };
    </script>
</body>
</html>
