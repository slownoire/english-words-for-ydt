<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDT Kelime Kartları</title>
    <style>
        body { margin: 0; padding: 0; box-sizing: border-box; background-color: #0d0d11; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; width: 90%; max-width: 550px; perspective: 1000px; }
        h1 { font-size: 1.8rem; color: #9f7aea; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-title { font-size: 0.9rem; color: #718096; margin-bottom: 25px; }
        .card-box { width: 100%; height: 340px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-box.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid #2d3748; }
        .card-front { background: linear-gradient(135deg, #1a1c23, #111217); }
        .card-back { background: linear-gradient(135deg, #1b1424, #0d0914); transform: rotateY(180deg); border-color: #553c9a; justify-content: space-between; }
        .word-type { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #a0aec0; margin-bottom: 10px; }
        .word-text { font-size: 2.4rem; font-weight: bold; color: #fff; word-break: break-word; }
        .meaning-text { font-size: 1.6rem; font-weight: 600; color: #b794f4; text-align: center; margin-top: 10px; }
        .sentence-box { background: rgba(255, 255, 255, 0.03); border-left: 3px solid #9f7aea; padding: 10px 15px; border-radius: 4px; margin: 15px 0; text-align: left; width: 100%; box-sizing: border-box; }
        .eng-sentence { font-size: 0.95rem; color: #e2e8f0; font-style: italic; line-height: 1.4; margin-bottom: 5px; }
        .highlight-word { color: #b794f4; font-weight: bold; font-style: normal; }
        .tr-sentence { font-size: 0.85rem; color: #a0aec0; line-height: 1.4; }
        .tip { font-size: 0.8rem; color: #4a5568; margin-top: auto; }
        .btn-next { margin-top: 30px; background-color: #553c9a; color: #fff; border: none; padding: 14px 40px; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(85, 60, 154, 0.4); transition: all 0.3s ease; }
        .btn-next:hover { background-color: #6b46c1; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(107, 70, 193, 0.6); }
    </style>
</head>
<body>
    <div class="container">
        <h1>YDT Kelime Kartları</h1>
        <div class="sub-title">Kelime Çalışma Alanı</div>
        <div class="card-box" id="card" onclick="flipCard()">
            <div class="card-side card-front">
                <div class="word-type" id="wordType">Yükleniyor...</div>
                <div class="word-text" id="englishWord">...</div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
            <div class="card-side card-back">
                <div class="word-type" style="color: #9f7aea; margin-bottom: 0;">TÜRKÇE ANLAMI</div>
                <div class="meaning-text" id="turkishMeaning">...</div>
                <div class="sentence-box">
                    <div class="eng-sentence" id="sampleEng">...</div>
                    <div class="tr-sentence" id="sampleTr">...</div>
                </div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
        </div>
        <button class="btn-next" onclick="nextWord(event)">Sıradaki Kelime ➔</button>
    </div>

    <script>
        // ÖSYM FORMATINDA DEV KELİME HAVUZU
        const wordPool = [
            { eng: "Enhance", tr: "Geliştirmek, artırmak", type: "Verb (Fiil)", exEng: "The new strategy will <span class='highlight-word'>enhance</span> your language skills.", exTr: "Yeni strateji dil becerilerinizi geliştirecektir." },
            { eng: "Facilitate", tr: "Kolaylaştırmak", type: "Verb (Fiil)", exEng: "Study plans <span class='highlight-word'>facilitate</span> learning difficult vocabulary.", exTr: "Çalışma planları zor kelimeleri öğrenmeyi kolaylaştırır." },
            { eng: "Implement", tr: "Uygulamaya koymak", type: "Verb (Fiil)", exEng: "The government decided to <span class='highlight-word'>implement</span> new economic policies.", exTr: "Hükümet yeni ekonomik politikaları uygulamaya koyma kararı aldı." },
            { eng: "Assess", tr: "Değerlendirmek", type: "Verb (Fiil)", exEng: "Mock exams are used to <span class='highlight-word'>assess</span> the progress of students.", exTr: "Deneme sınavları öğrencilerin ilerlemesini değerlendirmek için kullanılır." },
            { eng: "Acquire", tr: "Edinmek, kazanmak", type: "Verb (Fiil)", exEng: "It takes time and dedication to <span class='highlight-word'>acquire</span> a foreign language.", exTr: "Bir yabancı dil edinmek zaman ve kararlılık gerektirir." },
            { eng: "Investigate", tr: "Araştırmak, soruşturmak", type: "Verb (Fiil)", exEng: "The police are trying to <span class='highlight-word'>investigate</span> the cause of the accident.", exTr: "Polis kazanın nedenini araştırmaya çalışıyor." },
            { eng: "Determine", tr: "Belirlemek, saptamak", type: "Verb (Fiil)", exEng: "Your hard work will <span class='highlight-word'>determine</span> your success in the YDT.", exTr: "Sıkı çalışmanız YDT'deki başarınızı belirleyecektir." },
            { eng: "Contribute", tr: "Katkıda bulunmak", type: "Verb (Fiil)", exEng: "Regular reading will <span class='highlight-word'>contribute</span> to your vocabulary growth.", exTr: "Düzenli okuma yapmak kelime haznenizin gelişmesine katkıda bulunacaktır." },
            { eng: "Maintain", tr: "Sürdürmek, korumak", type: "Verb (Fiil)", exEng: "You must <span class='highlight-word'>maintain</span> your motivation high during this process.", exTr: "Bu süreçte motivasyonunuzu yüksek sürdürmelisiniz." },
            { eng: "Vulnerable", tr: "Hassas, savunmasız", type: "Adjective (Sıfat)", exEng: "Old buildings are highly <span class='highlight-word'>vulnerable</span> to strong earthquakes.", exTr: "Eski binalar güçlü depremlere karşı son derece savunmasızdır." },
            { eng: "Sustainable", tr: "Sürdürülebilir", type: "Adjective (Sıfat)", exEng: "Green energy is essential for <span class='highlight-word'>sustainable</span> development.", exTr: "Yeşil enerji sürdürülebilir kalkınma için şarttır." },
            { eng: "Significant", tr: "Önemli, kayda değer", type: "Adjective (Sıfat)", exEng: "There is a <span class='highlight-word'>significant</span> difference between the two results.", exTr: "İki sonuç arasında önemli bir fark var." },
            { eng: "Anxiety", tr: "Kaygı, endişe", type: "Noun (İsim)", exEng: "Deep breathing can help reduce exam <span class='highlight-word'>anxiety</span>.", exTr: "Derin nefes almak sınav kaygısını azaltmaya yardımcı olabilir." },
            { eng: "Obstacle", tr: "Engel, mani", type: "Noun (İsim)", exEng: "Lack of confidence can be a huge <span class='highlight-word'>obstacle</span> to success.", exTr: "Özgüven eksikliği başarının önünde büyük bir engel olabilir." },
            { eng: "Abandon", tr: "Terk etmek, bırakmak", type: "Verb (Fiil)", exEng: "The sailors had to <span class='highlight-word'>abandon</span> the sinking ship.", exTr: "Denizciler batan gemiyi terk etmek zorunda kaldı." },
            { eng: "Abolish", tr: "Yürürlükten kaldırmak", type: "Verb (Fiil)", exEng: "Some countries decided to <span class='highlight-word'>abolish</span> the death penalty.", exTr: "Bazı ülkeler ölüm cezasını kaldırmaya karar verdi." },
            { eng: "Accurate", tr: "Doğru, kesin", type: "Adjective (Sıfat)", exEng: "The weather forecast was surprisingly <span class='highlight-word'>accurate</span>.", exTr: "Hava durumu tahmini şaşırtıcı derecede doğruydu." },
            { eng: "Ambiguous", tr: "Belirsiz, muğlak", type: "Adjective (Sıfat)", exEng: "His reply was too <span class='highlight-word'>ambiguous</span> to understand.", exTr: "Cevabı anlaşılmayacak kadar belirsizdi." },
            { eng: "Compulsory", tr: "Zorunlu, mecburi", type: "Adjective (Sıfat)", exEng: "Primary education is <span class='highlight-word'>compulsory</span> in many countries.", exTr: "Birçok ülkede ilköğretim zorunludur." },
            { eng: "Crucial", tr: "Çok önemli, kritik", type: "Adjective (Sıfat)", exEng: "Time management plays a <span class='highlight-word'>crucial</span> role in exams.", exTr: "Zaman yönetimi sınavlarda kritik bir rol oynar." },
            { eng: "Decline", tr: "Azalmak, reddetmek", type: "Verb (Fiil)", exEng: "The number of tourists began to <span class='highlight-word'>decline</span> after the storm.", exTr: "Fırtınadan sonra turist sayısı azalmaya başladı." },
            { eng: "Drastic", tr: "Şiddetli, ani, radikal", type: "Adjective (Sıfat)", exEng: "The company made <span class='highlight-word'>drastic</span> changes to save money.", exTr: "Şirket para tasarrufu yapmak için radikal değişiklikler yaptı." },
            { eng: "Emphasize", tr: "Vurgulamak", type: "Verb (Fiil)", exEng: "The teacher wanted to <span class='highlight-word'>emphasize</span> the importance of grammar.", exTr: "Öğretmen dilbilgisinin önemini vurgulamak istedi." },
            { eng: "Fluctuate", tr: "Dalgalanmak, değişip durmak", type: "Verb (Fiil)", exEng: "Prices tend to <span class='highlight-word'>fluctuate</span> depending on demand.", exTr: "Fiyatlar talebe bağlı olarak dalgalanma eğilimindedir." },
            { eng: "Hostile", tr: "Düşmanca, saldırgan", type: "Adjective (Sıfat)", exEng: "The wild animal showed a <span class='highlight-word'>hostile</span> attitude towards visitors.", exTr: "Yabani hayvan ziyaretçilere karşı düşmanca bir tutum sergiledi." },
            { eng: "Inevitable", tr: "Kaçınılmaz", type: "Adjective (Sıfat)", exEng: "Changes are <span class='highlight-word'>inevitable</span> in a developing world.", exTr: "Gelişen bir dünyada değişimler kaçınılmazdır." },
            { eng: "Mutual", tr: "Karşılıklı, ortak", type: "Adjective (Sıfat)", exEng: "A healthy relationship is based on <span class='highlight-word'>mutual</span> respect.", exTr: "Sağlıklı bir ilişki karşılıklı saygıya dayanır." },
            { eng: "Precious", tr: "Değerli, kıymetli", type: "Adjective (Sıfat)", exEng: "Don't waste your <span class='highlight-word'>precious</span> time on social media.", exTr: "Değerli zamanınızı sosyal medyada boşa harcamayın." },
            { eng: "Reluctant", tr: "İsteksiz, gönülsüz", type: "Adjective (Sıfat)", exEng: "Many students are <span class='highlight-word'>reluctant</span> to speak in front of the class.", exTr: "Birçok öğrenci sınıfın önünde konuşma konusunda isteksizdir." },
            { eng: "Sufficient", tr: "Yeterli, kafi", type: "Adjective (Sıfat)", exEng: "Make sure you get <span class='highlight-word'>sufficient</span> sleep before the exam.", exTr: "Sınavdan önce yeterli uyku aldığınızdan emin olun." },
            { eng: "Adversely", tr: "Olumsuz yönde, aksine", type: "Adverb (Zarf)", exEng: "The bad weather <span class='highlight-word'>adversely</span> affected the harvest.", exTr: "Kötü hava durumu hasadı olumsuz yönde etkiledi." },
            { eng: "Profoundly", tr: "Derinden, tamamen", type: "Adverb (Zarf)", exEng: "The book <span class='highlight-word'>profoundly</span> influenced my way of thinking.", exTr: "Kitap, düşünme biçimi derinden etkiledi." }
        ];

        let activeQueue = [];
        const card = document.getElementById('card');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function regenerateQueue() {
            activeQueue = shuffleArray([...wordPool]);
        }

        function flipCard() { 
            card.classList.toggle('flipped'); 
        }

        function nextWord(event) {
            event.stopPropagation();
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(setNextWord, 250);
            } else { 
                setNextWord(); 
            }
        }

        function setNextWord() {
            if (activeQueue.length === 0) {
                regenerateQueue(); // Liste bitince arka planda sessizce yeni karışık liste hazırlar, kimseye bir şey demez.
            }
            
            const selectedWord = activeQueue.shift(); // Kelimeyi listeden çeker, döngü boyunca bir daha asla gelmez.
            
            document.getElementById('wordType').innerText = selectedWord.type;
            document.getElementById('englishWord').innerText = selectedWord.eng;
            document.getElementById('turkishMeaning').innerText = selectedWord.tr;
            document.getElementById('sampleEng').innerHTML = selectedWord.exEng;
            document.getElementById('sampleTr').innerText = selectedWord.exTr;
        }

        window.onload = function() {
            regenerateQueue();
            setNextWord();
        };
    </script>
</body>
</html>
