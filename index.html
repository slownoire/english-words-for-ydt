<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDT Vocabulary Cards</title>
    <style>
        body { margin: 0; padding: 0; box-sizing: border-box; background-color: #0d0d11; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; width: 90%; max-width: 550px; perspective: 1000px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.8rem; color: #9f7aea; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-title { font-size: 0.9rem; color: #718096; margin-bottom: 25px; }
        .card-box { width: 100%; height: 340px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 25px; }
        .card-box.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 25px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid #2d3748; }
        .card-front { background: linear-gradient(135deg, #1a1c23, #111217); }
        .card-back { background: linear-gradient(135deg, #1b1424, #0d0914); transform: rotateY(180deg); border-color: #553c9a; }
        .word-type { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #a0aec0; padding-top: 5px; }
        .word-text-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .word-text { font-size: 2.6rem; font-weight: bold; color: #fff; word-break: break-word; text-align: center; }
        .meaning-text { font-size: 1.8rem; font-weight: 600; color: #b794f4; text-align: center; margin-bottom: 15px; }
        .sentence-box { background: rgba(255, 255, 255, 0.03); border-left: 3px solid #9f7aea; padding: 12px 15px; border-radius: 4px; text-align: left; width: 100%; box-sizing: border-box; }
        .eng-sentence { font-size: 0.95rem; color: #e2e8f0; font-style: italic; line-height: 1.4; margin-bottom: 5px; }
        .highlight-word { color: #b794f4; font-weight: bold; font-style: normal; }
        .tr-sentence { font-size: 0.85rem; color: #a0aec0; line-height: 1.4; }
        .tip { font-size: 0.8rem; color: #4a5568; padding-bottom: 5px; width: 100%; text-align: center; }
        .btn-next { background-color: #553c9a; color: #fff; border: none; padding: 14px 40px; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(85, 60, 154, 0.4); transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; }
        .btn-next:hover { background-color: #6b46c1; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(107, 70, 193, 0.6); }
    </style>
</head>
<body>

    <div class="container">
        <h1>YDT Vocabulary Cards</h1>
        <div class="sub-title">Study Zone</div>
        
        <div class="card-box" id="card" onclick="flipCard()">
            <!-- KART ÖN YÜZÜ -->
            <div class="card-side card-front">
                <div class="word-type" id="wordType">ONLINE LEVEL</div>
                <div class="word-text-container">
                    <div class="word-text" id="englishWord">Loading...</div>
                </div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
            
            <!-- KART ARKA YÜZÜ -->
            <div class="card-side card-back">
                <div class="word-type" style="color: #9f7aea;">Meaning & Example</div>
                <div class="word-text-container">
                    <div class="meaning-text" id="turkishMeaning">Translating...</div>
                    <div class="sentence-box">
                        <div class="eng-sentence" id="sampleEng">...</div>
                        <div class="tr-sentence" id="sampleTr">...</div>
                    </div>
                </div>
                <div class="tip">Sıradaki kelimeye geçmek için aşağıdaki butona basın.</div>
            </div>
        </div>
        
        <button class="btn-next" onclick="nextWord(event)">Sıradaki Kelime ➔</button>
    </div>

    <script>
        const card = document.getElementById('card');
        let currentWord = "";

        function flipCard() { 
            card.classList.toggle('flipped'); 
        }

        function nextWord(event) {
            event.stopPropagation();
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                setTimeout(fetchOnlineWord, 250);
            } else { 
                fetchOnlineWord(); 
            }
        }

        // İnternetten tamamen rastgele ve sınırsız İngilizce kelime çeken fonksiyon
        async function fetchOnlineWord() {
            document.getElementById('englishWord').innerText = "Searching...";
            document.getElementById('wordType').innerText = "FETCHING...";
            document.getElementById('turkishMeaning').innerText = "Translating...";
            document.getElementById('sampleEng').innerText = "...";
            document.getElementById('sampleTr').innerText = "...";

            try {
                // 1. Adım: Tamamen ücretsiz, sınırsız rastgele kelime üreteci API'si
                const wordResponse = await fetch('https://random-word-api.herokuapp.com/word?number=1');
                const wordArray = await wordResponse.json();
                currentWord = wordArray[0];
                
                // Baş harfini büyütelim
                const formattedWord = currentWord.charAt(0).toUpperCase() + currentWord.slice(1);
                document.getElementById('englishWord').innerText = formattedWord;

                // 2. Adım: Kelimenin türünü ve örnek cümlesini Dictionary API'den çekelim
                const dictResponse = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${currentWord}`);
                
                let partOfSpeech = "Vocabulary";
                let exampleSentence = `The study of the word "${currentWord}" is valuable for language exams.`;

                if (dictResponse.ok) {
                    const dictData = await dictResponse.json();
                    if (dictData[0] && dictData[0].meanings[0]) {
                        partOfSpeech = dictData[0].meanings[0].partOfSpeech.toUpperCase();
                        const definition = dictData[0].meanings[0].definitions[0];
                        if (definition && definition.example) {
                            exampleSentence = definition.example;
                        }
                    }
                }
                document.getElementById('wordType').innerText = partOfSpeech;

                // Kelimeyi örnek cümle içinde mor renkle parlatalım
                const regex = new RegExp(`\\b${currentWord}\\b`, 'gi');
                const highlightedSentence = exampleSentence.replace(regex, `<span class='highlight-word'>$&</span>`);
                document.getElementById('sampleEng').innerHTML = highlightedSentence;

                // 3. Adım: Kelimenin ve Cümlenin Türkçe karşılığını ücretsiz MyMemory API ile canlı çevirelim
                // Kelime çevirisi
                const translateWordUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(currentWord)}&langpair=en|tr`;
                const trWordResponse = await fetch(translateWordUrl);
                const trWordData = await trWordResponse.json();
                let turkishMeaning = trWordData.responseData.translatedText;
                
                // Eğer sistem kelimeyi birebir çeviremediyse temizleyelim
                if(turkishMeaning.toLowerCase() === currentWord.toLowerCase()) {
                    turkishMeaning = "Genel Akademik Kelime";
                }
                document.getElementById('turkishMeaning').innerText = turkishMeaning;

                // Cümle çevirisi
                const translateSentenceUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(exampleSentence)}&langpair=en|tr`;
                const trSentResponse = await fetch(translateSentenceUrl);
                const trSentData = await trSentResponse.json();
                document.getElementById('sampleTr').innerText = trSentData.responseData.translatedText;

            } catch (error) {
                // İnternet anlık koparsa veya API yorulursa sistem çökmesin diye güvenli hata yönetimi
                document.getElementById('englishWord').innerText = "Connection Alert";
                document.getElementById('wordType').innerText = "ERROR";
                document.getElementById('turkishMeaning').innerText = "Lütfen tekrar deneyin.";
                document.getElementById('sampleEng').innerText = "An error occurred while fetching online data.";
                document.getElementById('sampleTr').innerText = "İnternet bağlantınızı kontrol edip sıradaki kelimeye basın.";
            }
        }

        // Sayfa ilk yüklendiğinde bir tane kelime getirsin
        window.onload = fetchOnlineWord;
    </script>
</body>
</html>
