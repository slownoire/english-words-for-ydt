    <meta charset="UTF-8">

    <title>YDT Kelime Kartları</title>
    <style>
        /* Modern ve Gözü Yormayan Karanlık Gotik Tema */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #0d0d11;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
        }

        h1 {
            font-size: 1.8rem;
            color: #9f7aea; /* Gotik Mor */
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sub-title {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 30px;
        }

        /* Kelime Kartı Tasarımı */
        .card-box {
            width: 100%;
            height: 250px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-box.flipped {
            transform: rotateY(180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d3748;
        }

        .card-front {
            background: linear-gradient(135deg, #1a1c23, #111217);
        }

        .card-back {
            background: linear-gradient(135deg, #1b1424, #0d0914);
            transform: rotateY(180deg);
            border-color: #553c9a;
        }

        .word-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a0aec0;
            margin-bottom: 15px;
        }

        .word-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            word-break: break-word;
        }

        .meaning-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #b794f4;
            text-align: center;
        }

        .tip {
            font-size: 0.8rem;
            color: #4a5568;
            margin-top: 20px;
        }

        /* Buton */
        .btn-next {
            margin-top: 35px;
            background-color: #553c9a;
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(85, 60, 154, 0.4);
            transition: all 0.3s ease;
        }

        .btn-next:hover {
            background-color: #6b46c1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 70, 193, 0.6);
        }
    </style>
</head>
